{% extends "base.html" %}
{% block title %}Регистрация - HorizonNetVPN{% endblock %}
{% block content %}
<h1>Регистрация</h1>
<div class="card stack">
  <form method="post" action="/register" class="stack">
    <label>Логин</label>
    <input class="input" type="text" name="login" minlength="3" required>
    <label>Пароль</label>
    <input class="input" type="password" name="password" minlength="8" required>
    <label>Повтор пароля</label>
    <input class="input" type="password" name="password2" minlength="8" required>
    <button class="btn" type="submit">Создать аккаунт</button>
  </form>
  {% if google_enabled %}
  <a class="btn btn-light" href="/auth/google">Регистрация через Google</a>
  {% endif %}
</div>
{% endblock %}
