<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}HorizonNetVPN{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css?v=20260423c">
</head>
<body>
  <header class="header">
    <div class="wrap header-row">
      <a class="logo" href="/">HorizonNetVPN</a>
      <nav class="menu">
        <a href="/pricing">Тарифы</a>
        <a href="/faq">FAQ</a>
        <a href="/contact">Контакты</a>
        {% if logged_in %}
        <a href="/account">Личный кабинет</a>
        <a href="/logout">Выйти</a>
        {% else %}
        <a href="/login">Войти</a>
        <a href="/register">Регистрация</a>
        {% endif %}
        <a class="btn btn-light" href="/account">Купить VPN</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="wrap footer-row">
      <span>{{ domain }}</span>
      <span>Поддержка: <a href="{{ support_url }}" target="_blank" rel="noopener">{{ support_tg }}</a></span>
    </div>
  </footer>
  <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="true"></div>
  <script>
    (function () {
      var root = document.getElementById("toast-root");
      if (!root) return;

      function showToast(message, kind) {
        if (!message) return;
        var toast = document.createElement("div");
        toast.className = "toast " + (kind === "ok" ? "toast-ok" : "toast-error");
        toast.textContent = message;
        root.appendChild(toast);
        setTimeout(function () { toast.classList.add("toast-visible"); }, 10);
        setTimeout(function () {
          toast.classList.remove("toast-visible");
          setTimeout(function () { toast.remove(); }, 200);
        }, 3600);
      }

      window.siteToast = showToast;
      {% if flash_error %}showToast({{ flash_error|tojson }}, "error");{% endif %}
      {% if flash_ok %}showToast({{ flash_ok|tojson }}, "ok");{% endif %}
    })();
  </script>
</body>
</html>
